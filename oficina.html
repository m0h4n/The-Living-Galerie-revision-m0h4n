<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Oficina del Encargado</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <!-- Título -->
    <div class="title-left">El encargado de la Galería</div>

    <!-- Barra superior -->
    <div class="top-bar"></div>

    <!-- Temporizador -->
    <div class="timer">Temporizador</div>

    <!-- Imagen -->
    <div class="image-box"></div>
    <img class="image-office" src="https://placehold.co/433x289" alt="oficina">

    <!-- Texto -->
    <div class="office-text">
        La oficina está abierta... No esperabas eso.<br><br>
        Adentro, todo está demasiado ordenado...
    </div>

    <!-- Panel inferior -->
    <div class="bottom-panel">
        <div class="panel-box">Pistas</div>
        <div class="panel-box">Premios</div>
        <div class="panel-box">Objetos recolectados</div>
    </div>

    <!-- Botones -->
    <div class="office-buttons">
        <button class="btn">Ir a seguridad</button>
        <button class="btn">Buscar en otra zona</button>
        <button class="btn">Presionarlo un poco más</button>
    </div>

</div>

</body>
</html>
