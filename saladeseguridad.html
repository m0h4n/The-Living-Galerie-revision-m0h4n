<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sala de seguridad</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar"></div>
    <div class="sidebar-text">Temporizador</div>

    <!-- Título -->
    <div class="title-section-left">Sala de seguridad</div>

    <!-- Imagen -->
    <div class="security-image-bg"></div>
    <img class="security-image" src="https://placehold.co/379x506" alt="seguridad">

    <!-- Texto -->
    <div class="security-text">
        La puerta está entreabierta. Adentro hay varios monitores...
    </div>

    <!-- Panel inferior -->
    <div class="bottom-panel-left">
        <div class="panel-box">Pistas</div>
        <div class="panel-box">Premios</div>
        <div class="panel-box">Objetos recolectados</div>
    </div>

    <!-- Botones -->
    <div class="security-buttons">
        <button class="btn">Ir con el encargado</button>
        <button class="btn">Buscar algo oculto</button>
        <button class="btn">Abrir el cajón</button>
    </div>

</div>

</body>
</html>
